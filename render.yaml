services:
  - type: web
    name: ai-hackathon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-hackathon-db
          property: connectionString

databases:
  - name: ai-hackathon-db
    plan: free
