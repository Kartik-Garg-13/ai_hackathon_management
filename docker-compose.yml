services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
      - ./sample_data:/sample_data:ro
    environment:
      - DATABASE_URL=sqlite:////data/app.db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  backend_data:
